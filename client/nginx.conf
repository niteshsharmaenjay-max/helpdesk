# Single-origin production setup: this container serves the built React app
# and reverse-proxies /api/* to the server container, stripping the /api
# prefix — the same rewrite vite.config.ts's dev proxy does — so the client's
# axios calls (`/api/tickets`, `/api/auth/...`, etc.) work unchanged and
# Better Auth's session cookie is set on this single origin.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri /index.html;
    }
}

# Single-origin production setup: this container serves the built React app
# and reverse-proxies /api/* to the server container, stripping the /api
# prefix — the same rewrite vite.config.ts's dev proxy does — so the client's
# axios calls (`/api/tickets`, `/api/auth/...`, etc.) work unchanged and
# Better Auth's session cookie is set on this single origin.
#
# This file is a template (see client/Dockerfile — it's copied to
# /etc/nginx/templates/default.conf.template, not conf.d/ directly), rendered
# by the official nginx image's docker-entrypoint via `envsubst` at container
# start. ${SERVER_UPSTREAM} is the backend's host:port — on docker-compose
# that's the service DNS name (`server:3000`, the Dockerfile's default via
# ENV), but it's whatever hostname:port your platform's private networking
# uses otherwise (e.g. Railway: <service-name>.railway.internal:<port>) —
# override the SERVER_UPSTREAM env var on the client service to match.
#
# ${PORT} is templated the same way — Railway assigns the public-facing
# service a port at runtime via the PORT env var and routes traffic to it,
# so this can't be a hardcoded 80. The Dockerfile sets a default of 80 for
# platforms (docker-compose) that don't inject PORT themselves.
#
# ${NGINX_LOCAL_RESOLVERS} is set by nginx's own official-image entrypoint
# (docker-entrypoint.d/15-local-resolvers.envsh, enabled via the Dockerfile's
# NGINX_ENTRYPOINT_LOCAL_RESOLVERS=1) — it parses /etc/resolv.conf so this
# works with whatever DNS resolver the platform actually provides (Docker's
# 127.0.0.11, Railway's private-networking resolver, etc.) without hardcoding
# one. The upstream is assigned to a variable rather than passed to
# proxy_pass directly — with a literal hostname, nginx resolves it once at
# startup and the whole container refuses to boot if that name isn't
# resolvable yet (e.g. the backend service still starting, DNS not
# propagated); through a variable, resolution happens lazily per-request
# using the resolver above, so a transient backend outage is a 502 on that
# request instead of a crash-looping container.
server {
    listen ${PORT};
    server_name _;
    resolver ${NGINX_LOCAL_RESOLVERS} valid=10s;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        # $backend_upstream must be set before `rewrite ... break` — break
        # halts processing of all ngx_http_rewrite_module directives in this
        # block, `set` included, so a `set` placed after it silently never
        # runs and proxy_pass sees an uninitialized variable (empty string).
        set $backend_upstream http://${SERVER_UPSTREAM};
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri /index.html;
    }
}
